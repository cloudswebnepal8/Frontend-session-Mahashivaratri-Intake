<html>
<head>
    <title>HTML List tutorial</title>
</head>

<body>
    <h1>Html List Tutorial</h1>

    <h2>Fruits List</h2>

    <!-- ordered list -->
    <ol type="I">
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
    </ol>

    <!-- unordered list -->
     <h2>Car List</h2>
    <ul type="square"> 
        <li>BMW</li>
        <li>Audi</li>
        <li>Mercedes</li>
    </ul>
</body>

</html>
